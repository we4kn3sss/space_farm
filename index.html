
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Farmer: Storm Edition</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00f3ff;
            --neon-gold: #ffcc00;
            --bg-dark: #0f0c29; /* Глубокий синий/черный */
        }

        body {
            background: radial-gradient(circle at center, #302b63, #0f0c29, #000);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        #header {
            width: 100%;
            padding: 25px 0;
            text-align: center;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(57, 255, 20, 0.1);
        }

        #energy-display {
            font-size: 36px;
            font-weight: 900;
            color: var(--neon-green);
            text-shadow: 0 0 20px rgba(57, 255, 20, 0.6);
        }

        /* АНИМАЦИЯ ТРЯСКИ КНОПКИ */
        @keyframes clickBump {

            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .bump {
            animation: clickBump 0.1s ease-out;
        }

        #main-button {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #222, #000);
            border: 4px solid var(--neon-green);
            border-radius: 50%;
            cursor: pointer;
            font-size: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
            position: relative;
            z-index: 10;
        }

        /* СЛУЧАЙНОЕ СОБЫТИЕ */
        #event-item {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            z-index: 100;
            filter: drop-shadow(0 0 15px var(--neon-gold));
            display: none;
            user-select: none;
            animation: bounce 2s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }

        #storm-indicator {
            position: fixed;

            top: 100px;
            background: var(--neon-gold);
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            box-shadow: 0 0 20px var(--neon-gold);
            z-index: 1000;
        }

        /* МАГАЗИН И ПРОЧЕЕ */
        #shop {
            background: rgba(20, 20, 25, 0.9);
            width: 100%;
            padding: 20px;
            border-top: 2px solid var(--neon-blue);
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-sizing: border-box;
        }

        .upgrade-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            color: #888;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .upgrade-btn.can-afford {
            border-color: var(--neon-blue);
            color: white;
        }

        #progress-bar {
            width: 0%; height: 100%;
            background: var(--neon-blue);
            transition: width 0.3s;
        }


        .floating-text {
            position: absolute;
            color: var(--neon-green);
            font-weight: bold;
            font-size: 32px;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="storm-indicator">⚡ КИБЕР-ШТОРМ: x5 ДОХОД! ⚡</div>

    <div id="header">
        <div id="energy-display">0 🔋</div>
        <div style="font-size: 14px; opacity: 0.8; margin-top:5px;">
            Клик: <span id="click-val">1</span> | Доход: <span id="dps-val">0</span>/сек
        </div>
    </div>

    <div id="farm-area">
        <div id="event-item">📀</div>
        <div id="main-button">🌱</div>
        <div id="progress-container" style="width:200px; height:6px; background:#222; margin-top:20px; border-radius:3px; overflow:hidden;">
            <div id="progress-bar"></div>
        </div>
        <div style="font-size: 12px; margin-top: 8px; color: var(--neon-blue);">
            След. мутация: <span id="next-lvl-name">🌿</span>
        </div>
    </div>

    <div id="shop">
        <button class="upgrade-btn" id="upgrade-click">
            <div><b>🛠 Инструменты</b><br><small id="c-price">15</small> 🔋</div>
            <div style="text-align:right">+1 к клику</div>
        </button>
        <button class="upgrade-btn" id="upgrade-drone">

            <div><b>🤖 Дроны</b><br><small id="d-price">50</small> 🔋</div>
            <div style="text-align:right">+1/сек</div>
        </button>
    </div>

    <script>
        let state = { energy: 0, clickPower: 1, baseDps: 0, clickPrice: 15, dronePrice: 50, level: 1 };
        let eventMultiplier = 1;
        const crops = ["🌱", "🌿", "☘️", "🌵", "🌴", "🌲", "🍀", "💎"];

        const mainBtn = document.getElementById('main-button');
        const eventItem = document.getElementById('event-item');
        const stormInd = document.getElementById('storm-indicator');

        function getMultiplier() { return Math.pow(2, state.level - 1) * eventMultiplier; }

        // КЛИК С АНИМАЦИЕЙ
        mainBtn.addEventListener('click', (e) => {
            state.energy += state.clickPower * getMultiplier();
            
            // Тряска
            mainBtn.classList.remove('bump');
            void mainBtn.offsetWidth; // Магия для перезапуска анимации
            mainBtn.classList.add('bump');

            createFloatingText(e.clientX, e.clientY, `+${state.clickPower * getMultiplier()}`);
            checkEvolution();
            updateUI();
        });

        // СПЕЦИАЛЬНОЕ СОБЫТИЕ
        function spawnEvent() {
            const x = Math.random() * (window.innerWidth - 60);
            const y = 150 + Math.random() * (window.innerHeight - 400);
            eventItem.style.left = x + 'px';
            eventItem.style.top = y + 'px';
            eventItem.style.display = 'block';
            
            setTimeout(() => { eventItem.style.display = 'none'; }, 5000);
        }

        eventItem.addEventListener('click', () => {
            eventItem.style.display = 'none';
            eventMultiplier = 5;
            stormInd.style.display = 'block';

            setTimeout(() => { 
                eventMultiplier = 1; 
                stormInd.style.display = 'none';
            }, 10000);
        });

        setInterval(spawnEvent, Math.random() * 30000 + 30000); // Раз в 30-60 сек

        // ОБЫЧНАЯ ЛОГИКА
        document.getElementById('upgrade-click').addEventListener('click', () => {
            if (state.energy >= state.clickPrice) {
                state.energy -= state.clickPrice;
                state.clickPower++;
                state.clickPrice = Math.floor(state.clickPrice * 1.8);
                updateUI();
            }
        });

        document.getElementById('upgrade-drone').addEventListener('click', () => {
            if (state.energy >= state.dronePrice) {
                state.energy -= state.dronePrice;
                state.baseDps++;
                state.dronePrice = Math.floor(state.dronePrice * 1.6);
                updateUI();
            }
        });

        function checkEvolution() {
            let nextT = Math.pow(4, state.level - 1) * 150;
            if (state.energy >= nextT && state.level < crops.length) {
                state.level++;
            }
        }

        function updateUI() {
            const m = getMultiplier();
            document.getElementById('energy-display').innerText = `${Math.floor(state.energy)} 🔋`;
            document.getElementById('click-val').innerText = state.clickPower * m;
            document.getElementById('dps-val').innerText = (state.baseDps * m).toFixed(1);
            document.getElementById('c-price').innerText = state.clickPrice;
            document.getElementById('d-price').innerText = state.dronePrice;
            mainBtn.innerText = crops[state.level - 1];
            
            document.getElementById('upgrade-click').classList.toggle('can-afford', state.energy 

>= state.clickPrice);
            document.getElementById('upgrade-drone').classList.toggle('can-afford', state.energy >= state.dronePrice);

            let nextT = Math.pow(4, state.level - 1) * 150;
            let progress = (state.energy / nextT) * 100;
            document.getElementById('progress-bar').style.width = Math.min(progress, 100) + '%';
        }

        function createFloatingText(x, y, val) {
            const t = document.createElement('div');
            t.className = 'floating-text';
            t.innerText = val;
            t.style.left = x + 'px'; t.style.top = y + 'px';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 600);
        }

        setInterval(() => { state.energy += (state.baseDps * getMultiplier()) / 10; updateUI(); }, 100);
        
        // Сохранение (localStorage)
        setInterval(() => localStorage.setItem('cyberFarmer_v4', JSON.stringify(state)), 5000);
        const saved = localStorage.getItem('cyberFarmer_v4');
        if (saved) state = JSON.parse(saved);
    </script>
</body>
</html>
