<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cyber Farmer Pro</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-blue: #00f3ff;
            --bg-dark: #0a0a0b;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        #header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: linear-gradient(to bottom, #111, transparent);
        }

        #energy-display {
            font-size: 32px;
            font-weight: bold;
            color: var(--neon-green);
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
        }

        .stats-sub {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }


        #farm-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }

        #main-button {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #222, #000);
            border: 4px solid var(--neon-green);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.3s;
            font-size: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.1);
        }

        #main-button:active {
            transform: scale(0.92);
        }

        #progress-container {
            width: 200px;
            height: 6px;
            background: #222;
            border-radius: 3px;
            margin-top: 20px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);

            transition: width 0.3s;
        }

        #shop {
            background: #161618;
            width: 100%;
            padding: 20px;
            border-top: 2px solid #333;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-sizing: border-box;
            max-height: 300px;
            overflow-y: auto;
        }

        .upgrade-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #444;
            color: #ccc;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .upgrade-btn.can-afford {
            border-color: var(--neon-blue);
            color: white;
            background: rgba(0, 243, 255, 0.05);
        }

        .upgrade-info b {
            display: block;
            font-size: 16px;
            margin-bottom: 2px;
        }

        .upgrade-info span {
            font-size: 12px;
            opacity: 0.7;
        }


        .upgrade-price {
            font-weight: bold;
            color: var(--neon-green);
        }

        .floating-text {
            position: absolute;
            color: var(--neon-green);
            font-weight: bold;
            font-size: 28px;
            pointer-events: none;
            animation: floatUp 0.7s ease-out forwards;
            z-index: 100;
            text-shadow: 0 0 5px black;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-130px) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="energy-display">0 🔋</div>
        <div class="stats-sub">
            Клик: <span id="click-val">1</span> | Доход: <span id="dps-val">0</span>/сек
        </div>
    </div>

    <div id="farm-area">
        <div id="main-button">🌱</div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div style="font-size: 12px; margin-top: 8px; color: var(--neon-blue);">
            До мутации: <span id="next-lvl-name">🌿</span>
        </div>
    </div>

    <div id="shop">
        <button class="upgrade-btn" id="upgrade-click">
            <div class="upgrade-info">

                <b>🛠 Инструменты</b>
                <span>Сила клика +1</span>
            </div>
            <div class="upgrade-price" id="click-price">15 🔋</div>
        </button>

        <button class="upgrade-btn" id="upgrade-drone">
            <div class="upgrade-info">
                <b>🤖 Дрон-сборщик</b>
                <span>Автодоход +1/сек</span>
            </div>
            <div class="upgrade-price" id="drone-price">50 🔋</div>
        </button>
    </div>

    <script>
        // --- СОСТОЯНИЕ ИГРЫ ---
        let state = {
            energy: 0,
            clickPower: 1,
            baseDps: 0,
            clickPrice: 15,
            dronePrice: 50,
            level: 1
        };

        const crops = ["🌱", "🌿", "☘️", "🌵", "🌴", "🌲", "🍀", "💎"];

        // --- ЭЛЕМЕНТЫ ---
        const energyEl = document.getElementById('energy-display');
        const clickValEl = document.getElementById('click-val');
        const dpsValEl = document.getElementById('dps-val');
        const clickPriceEl = document.getElementById('click-price');
        const dronePriceEl = document.getElementById('drone-price');
        const mainBtn = document.getElementById('main-button');
        const progressBar = document.getElementById('progress-bar');
        const nextLvlName = document.getElementById('next-lvl-name');

        // --- МАТЕМАТИКА БАЛАНСА ---
        function getNextLevelThreshold(lvl) {
            // Ур 2: 150, Ур 3: 600, Ур 4: 2400, Ур 5: 9600... (рост в 4 раза)
            return Math.pow(4, lvl - 1) * 150;
        }

        function getMultiplier() {

            return Math.pow(2, state.level - 1);
        }

        // --- ЛОГИКА ---
        mainBtn.addEventListener('click', (e) => {
            const power = state.clickPower * getMultiplier();
            state.energy += power;
            
            createFloatingText(e.clientX, e.clientY, `+${power}`);
            checkEvolution();
            updateUI();
            saveProgress();
        });

        document.getElementById('upgrade-click').addEventListener('click', () => {
            if (state.energy >= state.clickPrice) {
                state.energy -= state.clickPrice;
                state.clickPower += 1;
                state.clickPrice = Math.floor(state.clickPrice * 1.8);
                updateUI();
                saveProgress();
            }
        });

        document.getElementById('upgrade-drone').addEventListener('click', () => {
            if (state.energy >= state.dronePrice) {
                state.energy -= state.dronePrice;
                state.baseDps += 1;
                state.dronePrice = Math.floor(state.dronePrice * 1.6);
                updateUI();
                saveProgress();
            }
        });

        function checkEvolution() {
            if (state.level >= crops.length) return;
            
            let threshold = getNextLevelThreshold(state.level + 1);
            if (state.energy >= threshold) {
                state.level++;
                mainBtn.style.transform = "scale(1.2)";
                setTimeout(() => mainBtn.style.transform = "scale(1)", 200);
            }
        }

        function updateUI() {
            const mult = getMultiplier();
            energyEl.innerText = `${Math.floor(state.energy)} 🔋`;
            clickValEl.innerText = state.clickPower * mult;
            dpsValEl.innerText = state.baseDps * mult;
            
            clickPriceEl.innerText = `${state.clickPrice} 🔋`;
            dronePriceEl.innerText = `${state.dronePrice} 🔋`;

            // Обновление кнопок
            document.getElementById('upgrade-click').classList.toggle('can-afford', state.energy >= state.clickPrice);
            document.getElementById('upgrade-drone').classList.toggle('can-afford', state.energy >= state.dronePrice);

            // Растение и Прогресс-бар
            mainBtn.innerText = crops[state.level - 1];
            
            if (state.level < crops.length) {
                let nextT = getNextLevelThreshold(state.level + 1);
                let prevT = getNextLevelThreshold(state.level); // для корректного старта бара с 0
                if (state.level === 1) prevT = 0;
                
                let progress = ((state.energy - prevT) / (nextT - prevT)) * 100;
                progressBar.style.width = `${Math.min(Math.max(progress, 0), 100)}%`;
                nextLvlName.innerText = crops[state.level];
            } else {
                progressBar.style.width = "100%";
                nextLvlName.innerText = "MAX";
            }
        }

        function createFloatingText(x, y, val) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = val;
            text.style.left = `${x - 20}px`;
            text.style.top = `${y - 40}px`;
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 700);
        }

        // Авто-доход
        setInterval(() => {
            if (state.baseDps > 0) {

                state.energy += (state.baseDps * getMultiplier()) / 10;
                updateUI();
            }
        }, 100); // Обновляем 10 раз в секунду для плавности

        // --- SAVE/LOAD ---
        function saveProgress() {
            localStorage.setItem('cyberFarmer_v3', JSON.stringify(state));
        }

        function loadProgress() {
            const saved = localStorage.getItem('cyberFarmer_v3');
            if (saved) {
                state = { ...state, ...JSON.parse(saved) };
            }
            updateUI();
        }

        loadProgress();
        setInterval(saveProgress, 5000);
    </script>
</body>
</html>
